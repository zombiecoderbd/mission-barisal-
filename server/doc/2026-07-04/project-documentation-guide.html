# 📚 প্রকল্প ডকুমেন্টেশন গাইড

> **লিখেছেন:** সাহন সরবন — ডেভেলপার জোন, ঢাকা, বাংলাদেশ  
> **সংস্করণ:** 1.0.0  
> **সর্বশেষ আপডেট:** ২০২৬-০৭-০৪  

এই ডকুমেন্টেশনটি তৈরি করা হয়েছে যাতে **ভবিষ্যতে (১-২ বছর পরও)** যে কেউ প্রোজেক্টটি বুঝতে পারে, 
চালাতে পারে এবং পরিবর্তন করতে পারে। এখানে ব্যবহৃত প্রতিটি টেকনোলজি, ফিচার এবং ইমপ্লিমেন্টেশন 
বিস্তারিতভাবে বর্ণনা করা হয়েছে।

---

# ১. প্রকল্প পরিচিতি

## ১.১ প্রকল্পের নাম ও উদ্দেশ্য

প্রতিটি প্রকল্পের ডকুমেন্টেশনে **প্রথমেই** প্রকল্পের নাম, উদ্দেশ্য এবং মূল লক্ষ্য উল্লেখ করতে হবে।

```
প্রকল্পের নাম: [প্রকল্পের নাম]
উদ্দেশ্য: [কেন এই প্রকল্প তৈরি করা হয়েছে]
টার্গেট ইউজার: [কে ব্যবহার করবে]
মূল বৈশিষ্ট্য: [কী কী ফিচার আছে]
```

## ১.২ টিম মেম্বার

| নাম | ভূমিকা | যোগাযোগ |
|-----|--------|---------|
| [নাম] | [রোল] | [ইমেইল] |
| [নাম] | [রোল] | [ইমেইল] |

# ২. টেকনোলজি স্ট্যাক

## ২.১ ব্যাকএন্ড টেকনোলজিস

### 🐍 পাইথন (Python)

> **ব্যবহার:** API উন্নয়ন, ডাটা প্রসেসিং, স্ক্রিপ্টিং, মেশিন লার্নিং

- **ফ্রেমওয়ার্ক:** Django / Flask / FastAPI
- **পাইথন ভার্সন:** 3.10+
- **মূল লাইব্রেরি:**
  - `requests` — HTTP কল
  - `pandas` — ডাটা প্রসেসিং
  - `sqlalchemy` — ডাটাবেস ORM
  - `pydantic` — ডাটা ভ্যালিডেশন
- **প্রজেক্ট স্ট্রাকচার:**
  ```
  backend/
  ├── app/
  │   ├── api/       # API রাউট
  │   ├── models/    # ডাটাবেস মডেল
  │   ├── services/  # বিজনেস লজিক
  │   └── utils/     # হেলপার ফাংশন
  ├── tests/
  ├── requirements.txt
  └── Dockerfile
  ```

### 🔷 .NET (C#) — নোট: ডট নেট

> **ব্যবহার:** এন্টারপ্রাইজ অ্যাপ্লিকেশন, মাইক্রোসার্ভিস, REST API

- **ফ্রেমওয়ার্ক:** .NET 8 / ASP.NET Core
- **ভাষা:** C# 12
- **মূল প্যাকেজ:**
  - `Entity Framework Core` — ORM
  - `MediatR` — CQRS প্যাটার্ন
  - `FluentValidation` — ইনপুট ভ্যালিডেশন
  - `Serilog` — লগিং
- **প্রজেক্ট স্ট্রাকচার:**
  ```
  src/
  ├── WebAPI/        # API প্রজেক্ট
  ├── Application/   # অ্যাপ্লিকেশন লেয়ার
  ├── Domain/        # ডোমেইন মডেল
  └── Infrastructure/# ডাটাবেস, এক্সটার্নাল সার্ভিস
  ```

### 🟢 Node.js

> **ব্যবহার:** রিয়েল-টাইম অ্যাপ, REST/GraphQL API, মাইক্রোসার্ভিস

- **রানটাইম:** Node.js 20 LTS
- **ফ্রেমওয়ার্ক:** Express.js / Nest.js / Fastify
- **মূল প্যাকেজ:**
  - `prisma` / `typeorm` — ডাটাবেস ORM
  - `zod` / `joi` — ভ্যালিডেশন
  - `socket.io` — রিয়েল-টাইম যোগাযোগ
  - `winston` — লগিং
- **প্রজেক্ট স্ট্রাকচার:**
  ```
  server/
  ├── src/
  │   ├── routes/     # API রাউট
  │   ├── controllers/# রিকোয়েস্ট হ্যান্ডলার
  │   ├── services/   # বিজনেস লজিক
  │   ├── models/     # ডাটাবেস মডেল
  │   └── middleware/  # মিডলওয়্যার
  ├── prisma/         # ডাটাবেস স্কিমা
  └── tests/
  ```

### ⚡ Next.js

> **ব্যবহার:** ফুল-স্ট্যাক ওয়েব অ্যাপ্লিকেশন, SSR/SSG, API রাউট

- **ভার্সন:** Next.js 14 / 15 (App Router)
- **রেন্ডারিং স্ট্রাটেজি:**
  - `SSR` (Server-Side Rendering) — ডায়নামিক পেইজ
  - `SSG` (Static Site Generation) — ব্লগ, ডকুমেন্টেশন
  - `ISR` (Incremental Static Regeneration) — হাইব্রিড
  - `CSR` (Client-Side Rendering) — ড্যাশবোর্ড
- **ফোল্ডার স্ট্রাকচার:**
  ```
  app/
  ├── (auth)/        # অথেনটিকেশন গ্রুপ
  ├── dashboard/     # ড্যাশবোর্ড পেইজ
  ├── api/           # API রাউট (Route Handler)
  ├── components/    # শেয়ার্ড কম্পোনেন্ট
  └── lib/           # ইউটিলিটি ফাংশন
  ```

### 🎨 WordPress

> **ব্যবহার:** কন্টেন্ট ম্যানেজমেন্ট সিস্টেম (CMS), ব্লগ, ই-কমার্স

- **ভার্সন:** 6.x
- **কাস্টম ডেভেলপমেন্ট:**
  - `Custom Post Types` — কাস্টম কন্টেন্ট টাইপ
  - `ACF (Advanced Custom Fields)` — কাস্টম ফিল্ড
  - `REST API` — হেডলেস CMS
  - `Gutenberg Blocks` — কাস্টম ব্লক
- **প্লাগইন:** [গুরুত্বপূর্ণ প্লাগইনের তালিকা]
- **চাইল্ড থিম:** `parent-theme-child/style.css`

### 🧪 Laravel

> **ব্যবহার:** এন্টারপ্রাইজ ওয়েব অ্যাপ্লিকেশন, REST API, অ্যাডমিন প্যানেল

- **ভার্সন:** Laravel 11
- **পিএইচপি ভার্সন:** 8.2+
- **মূল প্যাকেজ:**
  - `Eloquent ORM` — ডাটাবেস
  - `Laravel Sanctum` — API অথেনটিকেশন
  - `Laravel Horizon` — কিউ ম্যানেজমেন্ট
  - `Laravel Telescope` — ডিবাগিং
- **প্রজেক্ট স্ট্রাকচার:**
  ```
  app/
  ├── Http/
  │   ├── Controllers/
  │   ├── Requests/    # ফর্ম রিকোয়েস্ট
  │   └── Middleware/
  ├── Models/
  ├── Services/
  └── Filament/        # অ্যাডমিন প্যানেল
  ```

## ২.২ ফ্রন্টএন্ড ফ্রেমওয়ার্ক

### ⚛️ React

> **ব্যবহার:** ইউজার ইন্টারফেস, কম্পোনেন্ট-ভিত্তিক আর্কিটেকচার

- **ভার্সন:** React 18 / 19
- **স্টেট ম্যানেজমেন্ট:** Redux Toolkit / Zustand / Jotai
- **রাউটিং:** React Router v6
- **UI লাইব্রেরি:** Material UI / Tailwind CSS + shadcn/ui / Ant Design
- **কম্পোনেন্ট স্ট্রাকচার:**
  ```
  components/
  ├── ui/           # বেসিক UI কম্পোনেন্ট
  ├── forms/        # ফর্ম কম্পোনেন্ট
  ├── layout/       # লেআউট কম্পোনেন্ট
  └── features/     # ফিচার-ভিত্তিক কম্পোনেন্ট
  ```

### 💚 Vue.js

# ৪. ফ্রন্টএন্ড আর্কিটেকচার

## ৪.১ কম্পোনেন্ট হায়ারার্কি

```
pages/ → layout/ → components/ → ui/
```

- **pages:** রাউট-লেভেল কম্পোনেন্ট (Next.js App Router)
- **layout:** শেয়ার্ড লেআউট (হেডার, ফুটার, সাইডবার)
- **components:** ফিচার-ভিত্তিক কম্পোনেন্ট
- **ui:** বেসিক UI কম্পোনেন্ট (বাটন, ইনপুট, মডেল)

## ৪.২ স্টেট ম্যানেজমেন্ট স্ট্রাটেজি

| টাইপ | টুল | কোথায় ব্যবহার হয় |
|------|-----|-------------------|
| লোকাল স্টেট | `useState` / `useReducer` | ফর্ম, মডেল |
| গ্লোবাল স্টেট | Redux Toolkit / Zustand | ইউজার, অ্যাপ কনফিগ |
| সার্ভার স্টেট | React Query / SWR | API ডাটা, ক্যাশিং |
| ইউআরএল স্টেট | next/navigation | ফিল্টার, সার্চ প্যারাম |

## ৪.৩ API ইন্টিগ্রেশন

- **HTTP ক্লায়েন্ট:** Axios / fetch
- **ইন্টারসেপ্টর:**
  - টোকেন রিফ্রেশ (401 → রিফ্রেশ → রিট্রাই)
  - এরর হ্যান্ডলিং (টোস্ট/নোটিফিকেশন)
- **বেস URL:** `process.env.NEXT_PUBLIC_API_URL`

## ৪.৪ স্টাইলিং অ্যাপ্রোচ

- **Tailwind CSS** — ইউটিলিটি-ফার্স্ট
- **CSS Modules** — স্কোপড স্টাইল
- **Styled Components** — CSS-in-JS
- **ভেরিয়েবল:** `:root` এ ডিফাইন, ডায়নামিক থিম

# ৫. ব্যাকএন্ড আর্কিটেকচার

## ৫.১ API ডিজাইন প্যাটার্ন

- **RESTful API:** সম্পদ-ভিত্তিক এন্ডপয়েন্ট
- **GraphQL:** জটিল ডাটা ফেচিং
- **ভার্সনিং:** `/api/v1/`, `/api/v2/`

## ৫.২ ডাটাবেস ডিজাইন

### ER ডায়াগ্রাম (মূল টেবিল)

```
users
├── id (PK, UUID)
├── name
├── email (UNIQUE)
├── password (bcrypt hashed)
├── role_id (FK → roles.id)
└── created_at

posts
├── id (PK, UUID)
├── title
├── slug (UNIQUE)
├── content (JSON / Markdown)
├── author_id (FK → users.id)
├── status (draft|published|archived)
├── published_at
└── created_at
```

### মাইগ্রেশন ফাইল লোকেশন

- Laravel: `database/migrations/`
- Django: `app/migrations/`
- Prisma: `prisma/schema.prisma`
- EF Core: `Data/Migrations/`

## ৫.৩ ক্যাশিং স্ট্রাটেজি

| লেয়ার | টুল | TTL | ব্যবহার |
|--------|-----|-----|---------|
| অ্যাপ্লিকেশন | Redis | ১ ঘন্টা | API রেসপন্স |
| ডাটাবেস | Query Cache | ১০ মিনিট | হেভি কোয়েরি |
| সিডিএন | Cloudflare | ২৪ ঘন্টা | স্ট্যাটিক ফাইল |
| ব্রাউজার | localStorage | সেশন | ইউজার প্রেফারেন্স |

        function initApp() {
            var sidebar = document.getElementById('sidebarMenu');
            var content = document.getElementById('content');
            var pageTitle = document.getElementById('pageTitle');

            // Render sidebar
            var sidebarHtml = '';
            for (var g = 0; g < MENU_CONFIG.length; g++) {
                var group = MENU_CONFIG[g];
                sidebarHtml += '<div class="sidebar-group"><div class="sidebar-group-title">' + group.group + '</div>';
                for (var i = 0; i < group.items.length; i++) {
                    var item = group.items[i];
                    var pid = 'mi-' + g + '-' + i;
                    sidebarHtml += '<a class="sidebar-item" id="' + pid + '" data-anchor="' + item.anchor + '" onclick="navigateTo(\'' + item.anchor + '\',this)">' + item.title + '</a>';
                }
                sidebarHtml += '</div>';
            }
            sidebar.innerHTML = sidebarHtml;

            // Read markdown from script tag and render
            var source = document.getElementById('markdownSource');
            var md = source.textContent || source.innerText || '';
            content.innerHTML = marked.parse(md, { breaks: true, gfm: true });

            // Fix heading IDs: after marked renders, assign predictable IDs to H1/H2
            // so sidebar navigation works correctly with Bengali/Unicode headings
            var allHeadings = content.querySelectorAll('h1, h2');
            var idMap = {};
            for (var hi = 0; hi < allHeadings.length; hi++) {
                var h = allHeadings[hi];
                var txt = h.textContent || h.innerText || '';
                // Remove emoji and special chars, keep Bengali + English + numbers + hyphens
                var clean = txt.replace(/[^\u0980-\u09FF\w\s-]/g, '').trim();
                var id = clean.replace(/\s+/g, '-').replace(/-+/g, '-').replace(/^-+|-+$/g, '').toLowerCase();
                // Fallback if empty
                if (!id) id = 'heading-' + hi;
                // Ensure uniqueness
                var finalId = id;
                var counter = 1;
                while (idMap[finalId]) { finalId = id + '-' + (counter++); }
                idMap[finalId] = true;
                h.id = finalId;
            }

            var scrollBtn = document.getElementById('scrollTop');
            window.addEventListener('scroll', function () {
                if (window.scrollY > 400) {
                    scrollBtn.classList.add('show');
                } else {
                    scrollBtn.classList.remove('show');
                }
            });

            // After fixing heading IDs, map sidebar groups to H1 headings
            var h1List = content.querySelectorAll('h1');
            var sidebarGroups = sidebar.querySelectorAll('.sidebar-group');
            for (var gi = 0; gi < sidebarGroups.length; gi++) {
                var h1 = h1List[gi + 1]; // +1 to skip main title
                if (h1) {
                    var hid = h1.id;
                    var items = sidebarGroups[gi].querySelectorAll('.sidebar-item');
                    for (var ii = 0; ii < items.length; ii++) {
                        items[ii].setAttribute('data-anchor', hid);
                        items[ii].onclick = (function (id) {
                            return function () { navigateTo(id, this); };
                        })(hid);
                    }
                }
            }

            // Scroll spy: update active sidebar item on scroll (H1 headings only)
            window.addEventListener('scroll', function () {
                var headings = document.querySelectorAll('.markdown-body h1[id]');
                var currentId = '';
                for (var i = 0; i < headings.length; i++) {
                    if (headings[i].getBoundingClientRect().top <= 120) {
                        currentId = headings[i].id;
                    }
                }
                if (currentId) {
                    document.querySelectorAll('.sidebar-item').forEach(function (el) { el.classList.remove('active'); });
                    var match = document.querySelector('[data-anchor="' + currentId + '"]');
                    if (match) match.classList.add('active');
                }
            });
        }

        function navigateTo(anchor, el) {
            // Update active state
            document.querySelectorAll('.sidebar-item').forEach(function (e) { e.classList.remove('active'); });
            if (el) el.classList.add('active');

            // Scroll to heading
            var target = document.getElementById(anchor);
            if (target) {
                target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }

            // Update page title
            var activeItem = document.querySelector('.sidebar-item.active');
            if (activeItem) {
                document.getElementById('pageTitle').textContent = activeItem.textContent.trim();
            }

            // Close sidebar on mobile
            if (window.innerWidth <= 768) {
                toggleSidebar(false);
            }
        }

        function toggleSidebar(force) {
            var sidebar = document.getElementById('sidebar');
            var overlay = document.getElementById('overlay');
            if (typeof force === 'boolean') {
                sidebar.classList.toggle('open', force);
                overlay.classList.toggle('show', force);
            } else {
                sidebar.classList.toggle('open');
                overlay.classList.toggle('show');
            }
        }

        // Initialize when DOM is ready
        document.addEventListener('DOMContentLoaded', function () {
            marked.setOptions({ gfm: true, breaks: true, silent: false });
            initApp();
        });
    </script>
